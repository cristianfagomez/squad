  <circle class="star" style="--d:1.7s" cx="1489" cy="834" r="2" fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--d:2.9s" cx="1634" cy="767" r="1.5" fill="#ffffff" opacity="0.4"/>
