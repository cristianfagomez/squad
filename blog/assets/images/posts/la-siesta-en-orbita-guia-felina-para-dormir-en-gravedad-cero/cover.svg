<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1024" width="1792" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
      @keyframes drift { 0%{transform:translateX(0) translateY(0)} 25%{transform:translateX(8px) translateY(-5px)} 50%{transform:translateX(0) translateY(-12px)} 75%{transform:translateX(-8px) translateY(-5px)} 100%{transform:translateX(0) translateY(0)} }
      .star { animation: twinkle var(--d,2s) infinite; }
      .hero { animation: float 4s ease-in-out infinite; }
      .particle { animation: drift 6s ease-in-out infinite; }
    </style>
  </defs>
  <!-- Fondo espacial -->
  <rect width="1792" height="1024" fill="url(#bg)"/>
  <!-- Nebula suave -->
  <ellipse cx="400" cy="300" rx="350" ry="200" fill="#6A0DAD" opacity="0.08"/>
  <ellipse cx="1400" cy="700" rx="300" ry="180" fill="#1E90FF" opacity="0.07"/>
  <ellipse cx="900" cy="512" rx="400" ry="250" fill="#0078d4" opacity="0.05"/>
  <!-- Estrellas -->
  <circle class="star" style="--d:1.8s" cx="87" cy="43" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--d:2.3s" cx="215" cy="178" r="1" fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--d:3.1s" cx="342" cy="67" r="2" fill="#50e6ff" opacity="0.7"/>
  <circle class="star" style="--d:1.5s" cx="478" cy="234" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--d:2.7s" cx="612" cy="89" r="1" fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--d:1.9s" cx="754" cy="145" r="1.5" fill="#50e6ff" opacity="0.5"/>
  <circle class="star" style="--d:3.4s" cx="891" cy="32" r="1" fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--d:2.1s" cx="1023" cy="201" r="2" fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--d:1.7s" cx="1167" cy="78" r="1.5" fill="#50e6ff" opacity="0.6"/>
  <circle class="star" style="--d:2.9s" cx="1298" cy="156" r="1" fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--d:3.6s" cx="1445" cy="43" r="2" fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--d:2.2s" cx="1589" cy="189" r="1.5" fill="#50e6ff" opacity="0.5"/>
  <circle class="star" style="--d:1.4s" cx="1723" cy="97" r="1" fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--d:2.8s" cx="56" cy="312" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--d:3.2s" cx="178" cy="467" r="1" fill="#50e6ff" opacity="0.5"/>
  <circle class="star" style="--d:1.6s" cx="301" cy="389" r="2" fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--d:2.5s" cx="534" cy="512" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle class="star" style="--d:3.8s" cx="667" cy="423" r="1" fill="#50e6ff" opacity="0.6"/>
  <circle class="star" style="--d:2.0s" cx="1289" cy="378" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--d:1.3s" cx="1423" cy="489" r="1" fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--d:2.6s" cx="1567" cy="334" r="2" fill="#50e6ff" opacity="0.7"/>
  <circle class="star" style="--d:3.0s" cx="1698" cy="445" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--d:1.8s" cx="112" cy="678" r="1" fill="#50e6ff" opacity="0.6"/>
  <circle class="star" style="--d:2.4s" cx="245" cy="756" r="2" fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--d:3.3s" cx="389" cy="823" r="1.5" fill="#ffffff" opacity="0.7"/>
