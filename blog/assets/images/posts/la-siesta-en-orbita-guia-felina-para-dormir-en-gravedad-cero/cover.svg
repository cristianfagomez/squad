  <circle class="star" style="--d:2.3s" cx="67" cy="934" r="2" fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--d:1.5s" cx="198" cy="978" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle class="star" style="--d:3.7s" cx="445" cy="956" r="1" fill="#50e6ff" opacity="0.6"/>
  <circle class="star" style="--d:2.0s" cx="1123" cy="912" r="2" fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--d:1.4s" cx="1267" cy="967" r="1.5" fill="#50e6ff" opacity="0.4"/>
  <circle class="star" style="--d:2.8s" cx="1534" cy="991" r="1" fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--d:3.1s" cx="1712" cy="945" r="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- Partículas flotantes cyan -->
  <circle class="particle" style="animation-delay:0s" cx="350" cy="480" r="3" fill="#50e6ff" opacity="0.4"/>
  <circle class="particle" style="animation-delay:1.5s" cx="750" cy="350" r="2" fill="#00CFFF" opacity="0.35"/>
  <circle class="particle" style="animation-delay:3s" cx="1150" cy="500" r="3" fill="#50e6ff" opacity="0.4"/>
  <circle class="particle" style="animation-delay:0.8s" cx="1400" cy="300" r="2" fill="#00CFFF" opacity="0.3"/>
  <circle class="particle" style="animation-delay:2.2s" cx="500" cy="650" r="2.5" fill="#50e6ff" opacity="0.35"/>
  <!-- Hexágonos decorativos -->
  <polygon points="200,380 220,370 240,380 240,400 220,410 200,400" fill="none" stroke="#00CFFF" stroke-width="1" opacity="0.25"/>
  <polygon points="1550,200 1575,186 1600,200 1600,228 1575,242 1550,228" fill="none" stroke="#0078d4" stroke-width="1.5" opacity="0.3"/>
