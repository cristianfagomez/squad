  <rect x="80" y="250" width="180" height="110" rx="4" fill="#00CFFF" opacity="0.04" stroke="#00CFFF" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="95" y1="270" x2="245" y2="270" stroke="#00CFFF" stroke-width="0.6" opacity="0.25"/>
  <line x1="95" y1="285" x2="220" y2="285" stroke="#00CFFF" stroke-width="0.6" opacity="0.2"/>
  <line x1="95" y1="300" x2="235" y2="300" stroke="#00CFFF" stroke-width="0.6" opacity="0.25"/>
  <line x1="95" y1="315" x2="200" y2="315" stroke="#00CFFF" stroke-width="0.6" opacity="0.15"/>
  <!-- Panel HUD derecho -->
  <rect x="1530" y="560" width="180" height="110" rx="4" fill="#0078d4" opacity="0.04" stroke="#0078d4" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="1545" y1="580" x2="1695" y2="580" stroke="#0078d4" stroke-width="0.6" opacity="0.25"/>
  <line x1="1545" y1="595" x2="1670" y2="595" stroke="#0078d4" stroke-width="0.6" opacity="0.2"/>
  <line x1="1545" y1="610" x2="1685" y2="610" stroke="#0078d4" stroke-width="0.6" opacity="0.25"/>
  <!-- Gato astronauta central con animación -->
  <text x="896" y="470" class="hero" text-anchor="middle" font-size="140" filter="url(#glow)">🐱🚀</text>
  <!-- Luna flotando (el casco de Luna orbita) -->
  <text x="700" y="420" class="particle" text-anchor="middle" font-size="40" opacity="0.6">🪐</text>
  <!-- Título del artículo -->
  <text x="896" y="600" text-anchor="middle" font-family="monospace" font-size="32"
        fill="#50e6ff" filter="url(#glow)" opacity="0.95">La Siesta en &#211;rbita: Gu&#237;a Felina para Do...</text>
  <!-- Subtítulo / descripción breve -->
  <text x="896" y="645" text-anchor="middle" font-family="monospace" font-size="18"
        fill="#0078d4" opacity="0.7">&#x2728; Gravedad cero, siestas infinitas &#x2728;</text>
  <!-- Badge modo SVG -->
  <text x="1760" y="1010" text-anchor="end" font-family="monospace" font-size="14"
        fill="#0078d4" opacity="0.5">svg-mode</text>
</svg>
